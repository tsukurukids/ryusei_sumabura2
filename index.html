<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマブラ風ゲーム プロトタイプ (分割版)</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="character-select-screen" class="screen">
        <h1>キャラクターを選択</h1>

        <!-- モード選択 -->
        <div id="mode-select" style="display:flex; justify-content:center; gap:14px; margin-bottom:6px;">
            <button id="btn-1p" class="mode-btn mode-btn-active" onclick="setGameMode('cpu')">🎮 1人用（CPU対戦）</button>
            <button id="btn-2p" class="mode-btn" onclick="setGameMode('2p')">👥 2人用（対戦）</button>
        </div>

        <div class="select-container">
            <div id="p1-select" class="player-select">
                <h2>Player 1</h2>
                <div class="char-options">
                    <div class="char-portrait" data-color="#e94560"
                        style="background-color: #e94560; background-image: url('キャラ選択/kyara1.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#50c878"
                        style="background-color: #50c878; background-image: url('キャラクター/midori.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#3498db"
                        style="background-color: #3498db; background-image: url('キャラクター/kyara4.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#f1c40f"
                        style="background-color: #f1c40f; background-image: url('キャラクター/pawa.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#9b59b6" style="background-color: #9b59b6;"></div>
                    <div class="char-portrait" data-color="#daa520"
                        style="background-color: #daa520; background-image: url('キャラクター/kyara6.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#E0E0E0"
                        style="background-color: #E0E0E0; background-image: url('キャラクター/ktara5.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#FF8C00" style="background-color: #FF8C00;"></div>
                    <div class="char-portrait" data-color="#8B4513" style="background-color: #8B4513;"></div>
                    <div class="char-portrait" data-color="#4B0082" style="background-color: #4B0082;"></div>
                    <div class="char-portrait" data-color="#FFC0CB"
                        style="background-color: #FFC0CB; background-image: url('キャラクター/pinnku.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#000000"
                        style="background-color: #000000; background-image: url('キャラクター/kuro.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#808080" style="background-color: #808080;"></div>
                    <div class="char-portrait" data-color="#FADADD"
                        style="background-color: #FADADD; background-image: url('キャラクター/akasiro.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#FF9900"
                        style="background-color: #FF9900; background-image: url('キャラクター/kyara9.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#800000"
                        style="background-color: #800000; background-image: url('キャラクター/boos.png'); background-size: cover; background-position: center;">
                    </div>
                </div>
                <p id="p1-char-description" class="char-description">キャラクターを選択してください</p>
                <button id="p1-ready-btn" class="ready-btn">準備完了</button>
            </div>
            <div id="p2-select" class="player-select">
                <h2 id="p2-title">CPU</h2>
                <!-- CPU難易度選択 -->
                <div id="cpu-difficulty" style="margin-bottom:6px;">
                    <p style="margin:2px 0; font-size:12px; color:#aaa;">難易度を選んでください</p>
                    <div style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">
                        <button class="diff-btn diff-btn-active" id="diff-easy" onclick="setCpuDifficulty('easy')">🟢
                            よわい</button>
                        <button class="diff-btn" id="diff-normal" onclick="setCpuDifficulty('normal')">🟡 ふつう</button>
                        <button class="diff-btn" id="diff-hard" onclick="setCpuDifficulty('hard')">🔴 つよい</button>
                    </div>
                </div>
                <div class="char-options">
                    <div class="char-portrait" data-color="#e94560"
                        style="background-color: #e94560; background-image: url('キャラ選択/kyara1.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#50c878"
                        style="background-color: #50c878; background-image: url('キャラクター/midori.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#3498db"
                        style="background-color: #3498db; background-image: url('キャラクター/kyara4.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#f1c40f"
                        style="background-color: #f1c40f; background-image: url('キャラクター/pawa.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#9b59b6" style="background-color: #9b59b6;"></div>
                    <div class="char-portrait" data-color="#daa520"
                        style="background-color: #daa520; background-image: url('キャラクター/kyara6.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#E0E0E0"
                        style="background-color: #E0E0E0; background-image: url('キャラクター/ktara5.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#FF8C00" style="background-color: #FF8C00;"></div>
                    <div class="char-portrait" data-color="#8B4513" style="background-color: #8B4513;"></div>
                    <div class="char-portrait" data-color="#4B0082" style="background-color: #4B0082;"></div>
                    <div class="char-portrait" data-color="#FFC0CB"
                        style="background-color: #FFC0CB; background-image: url('キャラクター/pinnku.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#000000"
                        style="background-color: #000000; background-image: url('キャラクター/kuro.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#808080" style="background-color: #808080;"></div>
                    <div class="char-portrait" data-color="#FADADD"
                        style="background-color: #FADADD; background-image: url('キャラクター/akasiro.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#FF9900"
                        style="background-color: #FF9900; background-image: url('キャラクター/kyara9.png'); background-size: cover; background-position: center;">
                    </div>
                    <div class="char-portrait" data-color="#800000"
                        style="background-color: #800000; background-image: url('キャラクター/boos.png'); background-size: cover; background-position: center;">
                    </div>
                </div>
                <p id="p2-char-description" class="char-description">キャラクターを選択してください</p>
                <button id="p2-ready-btn" class="ready-btn">準備完了</button>
            </div>
        </div>
        <button id="start-game-btn" disabled>ステージ選択へ</button>
    </div>

    <div id="stage-select-screen" class="screen hidden">
        <h1>ステージを選択</h1>
        <div class="stage-preview-container">
            <div id="prev-stage-btn" class="stage-nav-btn">◀</div>
            <div id="stage-preview" class="stage-preview"></div>
            <div id="next-stage-btn" class="stage-nav-btn">▶</div>
        </div>
        <h2 id="stage-name"></h2>
        <button id="fight-btn">対戦開始！</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="game-over-overlay" class="hidden">
            <h2 id="winner-text"></h2>
        </div>
        <h1>スマブラ風ゲーム</h1>

        <div id="hud-container"
            style="display: flex; justify-content: space-between; width: 1100px; margin: 0 auto; padding: 10px 20px; box-sizing: border-box; background-color: rgba(0, 0, 0, 0.7); color: white; border-radius: 10px 10px 0 0;">
            <div id="p1-hud" style="text-align: left;">
                <h3 id="p1-name" style="margin: 0; font-size: 20px; color: #e94560;">Player 1</h3>
                <div id="p1-damage"
                    style="font-size: 36px; font-weight: bold; margin: 5px 0; text-shadow: 2px 2px 4px #000;">0%</div>
                <div id="p1-lives" style="font-size: 20px;">残機: 3</div>
            </div>
            <div id="p2-hud" style="text-align: right;">
                <h3 id="p2-name" style="margin: 0; font-size: 20px; color: #3498db;">Player 2</h3>
                <div id="p2-damage"
                    style="font-size: 36px; font-weight: bold; margin: 5px 0; text-shadow: 2px 2px 4px #000;">0%</div>
                <div id="p2-lives" style="font-size: 20px;">残機: 3</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="1100" height="650"></canvas>
        <div id="game-controls-container" class="controls-container"></div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/characterRegistry.js"></script>

    <!-- Character Logic Files -->
    <script src="js/characters/red.js"></script>
    <script src="js/characters/green.js"></script>
    <script src="js/characters/blue.js"></script>
    <script src="js/characters/yellow.js"></script>
    <script src="js/characters/purple.js"></script>
    <script src="js/characters/gold.js"></script>
    <script src="js/characters/white.js"></script>
    <script src="js/characters/orange.js"></script>
    <script src="js/characters/brown.js"></script>
    <script src="js/characters/indigo.js"></script>
    <script src="js/characters/pink.js"></script>
    <script src="js/characters/black.js"></script>
    <script src="js/characters/grey.js"></script>
    <script src="js/characters/red_white.js"></script>
    <script src="js/characters/kohaku.js"></script>
    <script src="js/characters/bigboss.js"></script>

    <script src="js/player.js"></script>
    <script src="js/cpu.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
